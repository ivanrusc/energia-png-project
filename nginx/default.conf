server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    autoindex off;
    charset utf-8;

    # No exposem l'arrel del domini. Només funciona la ruta secreta.
    location = / {
        return 404;
    }

    # Bloqueja fitxers ocults: .env, .git, etc.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Imatges PNG sense cache.
    location ~* \.png$ {
        try_files $uri =404;

        expires off;
        etag off;
        if_modified_since off;

        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # HTML i resta de fitxers sense cache.
    location / {
        try_files $uri $uri/ =404;

        expires off;
        etag off;
        if_modified_since off;

        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
